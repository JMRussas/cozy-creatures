services:
  livekit:
    image: livekit/livekit-server:v1.9.11
    ports:
      - "7880:7880"      # HTTP + WebSocket
      - "7881:7881"      # RTC (TCP fallback)
      - "7882:7882/udp"  # RTC (UDP, primary media transport)
    environment:
      - "LIVEKIT_KEYS=devkey: secret"
    command: --dev --bind 0.0.0.0 --node-ip 192.168.1.154
